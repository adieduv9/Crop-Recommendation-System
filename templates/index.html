<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Planning System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        input, select {
            width: 95%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            width: 100%;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e6ffe6;
            border-radius: 8px;
        }
        .error {
            margin-top: 20px;
            padding: 15px;
            background: #ffe6e6;
            border-radius: 8px;
            color: red;
        }
        #suggestions {
            list-style: none;
            padding: 0;
            margin: 0;
            background: white;
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
        }
        #suggestions li {
            padding: 6px;
            cursor: pointer;
        }
        #suggestions li:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>🌾 AI Crop Planning System</h2>

<form method="POST" action="/predict">

    <label>City</label>
    <input type="text" id="cityInput" placeholder="Start typing city..." autocomplete="off" required>
    <input type="hidden" name="lat" id="lat">
    <input type="hidden" name="lon" id="lon">
    <ul id="suggestions"></ul>

    <select name="duration">
        <option value="1">Plan for 1 Month</option>
        <option value="2">Plan for 2 Months</option>
        <option value="3">Plan for 3 Months</option>
        <option value="4">Plan for 4 Months</option>
        <option value="5">Plan for 5 Months</option>
        <option value="6">Plan for 6 Months</option>
    </select>

    <input type="number" name="nitrogen" placeholder="Nitrogen (N)" required>
    <input type="number" name="phosphorus" placeholder="Phosphorus (P)" required>
    <input type="number" name="potassium" placeholder="Potassium (K)" required>
    <input type="number" step="0.1" name="ph" placeholder="pH value" required>
    <input type="number" step="0.1" name="rainfall" placeholder="Rainfall (mm)" required>

    <button type="submit">Predict Crop</button>
</form>

{% if prediction %}
<div class="result">
    <h3>Recommended Crop: {{ prediction }}</h3>
    <p>Season: {{ season }}</p>
    <p>Projected Temperature: {{ temperature }} °C</p>
    <p>Humidity: {{ humidity }} %</p>
</div>
{% endif %}

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<script>
const input = document.getElementById("cityInput");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", async () => {
    const query = input.value;
    if (query.length < 2) {
        suggestions.innerHTML = "";
        return;
    }

    const response = await fetch(`/search-city?q=${query}`);
    const data = await response.json();

    suggestions.innerHTML = "";

    data.forEach(city => {
        const li = document.createElement("li");
        li.textContent = `${city.name}, ${city.country}`;
        li.onclick = () => {
            input.value = `${city.name}, ${city.country}`;
            document.getElementById("lat").value = city.lat;
            document.getElementById("lon").value = city.lon;
            suggestions.innerHTML = "";
        };
        suggestions.appendChild(li);
    });
});
</script>

</body>
</html>
